<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Service Request Form</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#231a74",
                "background-light": "#f6f6f8",
                "background-dark": "#14131f",
              },
              fontFamily: {
                "display": ["Inter", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen text-slate-900 dark:text-slate-100 flex justify-center">
<div class="relative flex h-full w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-xl min-h-screen">
<!-- Top App Bar -->
<div class="flex items-center bg-white dark:bg-[#1e1c2e] p-4 sticky top-0 z-10 shadow-sm border-b border-slate-100 dark:border-slate-800">
<button class="text-slate-900 dark:text-white flex size-12 shrink-0 items-center justify-center hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">New Request</h2>
</div>
<div class="flex-1 overflow-y-auto pb-24">
<!-- Header -->
<div class="px-4 pt-6 pb-2">
<div class="flex items-center gap-3 mb-1">
<div class="bg-primary/10 dark:bg-primary/30 p-2 rounded-lg text-primary dark:text-primary-light">
<span class="material-symbols-outlined">plumbing</span>
</div>
<h2 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight">Plumbing Service</h2>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm pl-1">Fill out the details below to request a technician.</p>
</div>
<!-- Description Field -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-white text-base font-semibold leading-normal pb-2">Describe the problem</p>
<textarea class="form-textarea w-full rounded-xl border-0 bg-white dark:bg-[#1e1c2e] text-slate-900 dark:text-white ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary placeholder:text-slate-400 p-4 min-h-[140px] text-base shadow-sm resize-none transition-shadow" placeholder="Please provide details about the issue (e.g., leaking pipe under the sink, water heater not working)..."></textarea>
</label>
</div>
<!-- Upload Photos -->
<div class="px-4 py-3">
<div class="flex items-center justify-between pb-3">
<h2 class="text-slate-900 dark:text-white text-base font-semibold leading-tight">Upload Photos</h2>
<span class="text-xs font-medium text-slate-500 bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded-full">Optional</span>
</div>
<div class="grid grid-cols-3 gap-3">
<!-- Slot 1: Placeholder Image -->
<div class="relative group cursor-pointer aspect-square">
<div class="w-full h-full bg-center bg-no-repeat bg-cover rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm transition-transform active:scale-95" data-alt="Close up of kitchen sink pipes" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBrBElDPfTFfKNicqpUVMxNMCb8VbHziMkhVwYM89HQwFEqwOcHKU7_jVHeRGW7lDf5U6RxumsNWk6RFnIEoVBSR02e_UwU19rgfah8MXNjq9PInwUODDUHqfhf6l2E71WBoaICyrwBF7ayF8kpBXPfoKWY2beA79-DDz88XoJjV2jUDzQUvuupQ77OQ0Nbk2lVU_KCcSgUSlmWcPA_y_iEFwhZYh_uWJFEirYpmRBHTtdW-wysWbtosOU4R4Nwww5fb1zIRiYjaoE");'>
<div class="absolute top-1 right-1 bg-white/90 dark:bg-black/60 rounded-full p-1 shadow-sm">
<span class="material-symbols-outlined text-[16px] text-red-500">close</span>
</div>
</div>
</div>
<!-- Slot 2: Empty Add Button -->
<button class="flex flex-col items-center justify-center w-full aspect-square bg-white dark:bg-[#1e1c2e] border-2 border-dashed border-primary/30 dark:border-primary/50 rounded-xl text-primary hover:bg-primary/5 dark:hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[32px] mb-1">add_a_photo</span>
<span class="text-xs font-medium">Add Photo</span>
</button>
<!-- Slot 3: Empty Add Button -->
<button class="flex flex-col items-center justify-center w-full aspect-square bg-white dark:bg-[#1e1c2e] border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl text-slate-400 hover:border-primary/50 hover:text-primary hover:bg-primary/5 dark:hover:bg-primary/10 transition-all">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
</div>
</div>
<!-- Urgency Toggle -->
<div class="px-4 py-4">
<h2 class="text-slate-900 dark:text-white text-base font-semibold leading-tight pb-3">Urgency Level</h2>
<div class="bg-white dark:bg-[#1e1c2e] p-1 rounded-xl flex shadow-sm border border-slate-100 dark:border-slate-800">
<button class="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-white font-medium shadow-sm transition-all">
<span class="material-symbols-outlined text-[20px] filled">schedule</span>
                        Normal
                    </button>
<button class="flex-1 flex items-center justify-center gap-2 py-3 px-4 rounded-lg text-slate-500 dark:text-slate-400 font-medium hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
<span class="material-symbols-outlined text-[20px] text-red-500">warning</span>
                        Emergency
                    </button>
</div>
</div>
<!-- Location Snippet -->
<div class="px-4 py-3">
<h2 class="text-slate-900 dark:text-white text-base font-semibold leading-tight pb-3">Location</h2>
<div class="relative w-full h-40 rounded-xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-700 group">
<!-- Map Background Image -->
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Map view of city streets" data-location="San Francisco" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDL1bJ-DmCYNPDoJ9gyIgqVOcYCIlykNZZE--upG6PenpQQMkOLYFkzmKZ_jW4JAqsji_uWcygmGQlLgcveCo0Mn8LUk16OtLcMfXkc5SrXDW-S6hKo5c7rUAUHUsq5m77K7Q3TWKoxakONdz91eOntKvV66-hFSA1clQnzahSl-vMIJdYMnU7CTGLJqoPZg47kVRRNjn4Ff38Qdnmsp8oe7wu8GVq6H4BrkE2iMlNuqBvaWdrXLOiX9IR9I24ZBb_Mf88k3jY6970');">
</div>
<!-- Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
<!-- Content -->
<div class="absolute bottom-3 left-3 right-3 flex items-center justify-between">
<div class="flex items-center gap-2 text-white">
<span class="material-symbols-outlined text-red-400 drop-shadow-md filled">location_on</span>
<span class="text-sm font-medium drop-shadow-md truncate max-w-[180px]">123 Main St, Springfield</span>
</div>
<button class="bg-white/90 dark:bg-black/60 hover:bg-white text-xs font-semibold px-3 py-1.5 rounded-lg backdrop-blur-sm text-slate-900 dark:text-white shadow-sm transition-colors">
                            Edit
                        </button>
</div>
</div>
</div>
<div class="h-6"></div>
</div>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 w-full bg-white dark:bg-[#1e1c2e] border-t border-slate-100 dark:border-slate-800 p-4 pb-8 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 active:scale-[0.99] transition-all flex items-center justify-center gap-2">
<span>Submit Request</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
